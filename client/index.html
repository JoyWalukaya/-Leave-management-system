<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <header class="header">
        <div class="header-left">
            <img src="logo.png" alt="Logo" class="header-logo">
            <div class="header-titles">
                <h1>Leave Management System</h1>
            </div>
        </div>
        <div class="header-right">
            <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
            <img src="logo2.png" alt="Logo" class="header-logo-right">
        </div>
    </header>

    <div class="login-container">
        <div class="login-card">
            <h3 style="text-align:center; margin-bottom:1.5rem; color:var(--navy)">Login</h3>

            <div class="alert" id="login-alert"></div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="login()">Login</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
